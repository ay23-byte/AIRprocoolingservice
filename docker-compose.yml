services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - MONGODB_URI=${MONGODB_URI:-mongodb://localhost:27017/ac_booking}
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  # Optional: MongoDB service (uncomment if you want MongoDB in Docker too)
